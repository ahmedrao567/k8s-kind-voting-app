name: CI Vote

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build vote image
        run: docker build -t local/vote:ci ./vote

      - name: Run vote container
        run: docker run -d --name vote-ci -p 8080:80 local/vote:ci

      - name: Smoke test vote app
        run: |
          sleep 8
          curl -fsS http://localhost:8080 > /dev/null

      - name: Print logs on failure
        if: failure()
        run: docker logs vote-ci

      - name: Cleanup
        if: always()
        run: docker rm -f vote-ci || true

  push-image:
    runs-on: ubuntu-latest
    needs: build-test-run
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/ahmedikram567/vote-app
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push vote image
        uses: docker/build-push-action@v6
        with:
          context: ./vote
          file: ./vote/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
