name: CI Vote

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build vote image
        run: docker build -t local/vote:ci ./vote

      - name: Run vote container
        run: docker run -d --name vote-ci -p 8080:80 local/vote:ci

      - name: Smoke test vote app
        run: |
          sleep 8
          curl -fsS http://localhost:8080 > /dev/null

      - name: Print logs on failure
        if: failure()
        run: docker logs vote-ci

      - name: Cleanup
        if: always()
        run: docker rm -f vote-ci || true
