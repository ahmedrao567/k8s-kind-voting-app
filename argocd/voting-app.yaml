apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: |
      vote=docker.io/ahmedikram567/vote-app
      result=docker.io/ahmedikram567/result-app
      worker=docker.io/ahmedikram567/worker-app

    argocd-image-updater.argoproj.io/vote.update-strategy: semver
    argocd-image-updater.argoproj.io/result.update-strategy: semver
    argocd-image-updater.argoproj.io/worker.update-strategy: semver

    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/ahmedrao567/k8s-kind-voting-app.git
    targetRevision: main
    path: k8s-specifications
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
