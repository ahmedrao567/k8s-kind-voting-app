name: CI Worker

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build worker image
        run: docker build -t local/worker:ci ./worker

      - name: Run worker with dependencies
        run: |
          docker compose up -d --build redis db worker
          sleep 15
          docker ps --filter name=worker --filter status=running --format '{{.Names}}' | grep worker

      - name: Print worker logs
        run: docker logs worker || true

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  push-image:
    runs-on: ubuntu-latest
    needs: build-test-run
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/ahmedikram567/worker-app
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

