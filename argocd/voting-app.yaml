apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: vote=docker.io/ahmedrao/vote-app:latest,result=docker.io/ahmedrao/result-app:latest,worker=docker.io/ahmedrao/worker-app:latest
    argocd-image-updater.argoproj.io/vote.update-strategy: newest-build
    argocd-image-updater.argoproj.io/result.update-strategy: newest-build
    argocd-image-updater.argoproj.io/worker.update-strategy: newest-build
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/ahmedrao567/k8s-kind-voting-app.git
    targetRevision: main
    path: k8s-specifications
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
