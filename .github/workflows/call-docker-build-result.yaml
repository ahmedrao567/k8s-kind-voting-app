name: CI Result

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run integration test stack
        run: |
          docker compose -f result/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from sut

      - name: Cleanup
        if: always()
        run: docker compose -f result/docker-compose.test.yml down -v --remove-orphans

  push-image:
    runs-on: ubuntu-latest
    needs: build-test-run
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/ahmedikram567/result-app
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push result image
        uses: docker/build-push-action@v6
        with:
          context: ./result
          file: ./result/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
