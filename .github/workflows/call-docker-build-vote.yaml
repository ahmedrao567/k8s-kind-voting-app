name: Build Vote

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  call-docker-build:

    name: Vote Call Docker Build

    uses: dockersamples/.github/.github/workflows/reusable-docker-build.yaml@main

    permissions:
      contents: read
      packages: write
      pull-requests: write
    
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}

      dockerhub-token: ${{ secrets.DOCKERHUB_PASSWORD || secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}

    with:
      dockerhub-enable: true
      ghcr-enable: true

      image-names: |
        ghcr.io/${{ github.repository_owner }}/example-voting-app-vote
        ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/examplevotingapp_vote

      tag-rules: |
        type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
        type=raw,value=before,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
        type=raw,value=after,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
        type=ref,event=pr

      context: vote

      platforms: linux/amd64,linux/arm64,linux/arm/v7
